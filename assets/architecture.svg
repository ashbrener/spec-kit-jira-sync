<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title>spec-kit-jira architecture pipeline</title>
  <desc>Left-to-right pipeline: spec-kit source files are read by a parser into a neutral workstate JSON contract, which the vendor-neutral reconcile engine drives into a Jira-specific sink that mirrors to Jira REST. The filesystem is the source of truth; Jira is a read-only mirror.</desc>

  <defs>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#1f2328" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8c959f"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="979" height="359" rx="16" fill="#ffffff" stroke="#d0d7de"/>

  <!-- heading -->
  <text x="40" y="50" font-size="17" font-weight="700" fill="#1f2328">spec-kit-jira</text>
  <text x="40" y="70" font-size="11.5" fill="#57606a">specs in, a Jira mirror out — one neutral contract between them</text>

  <!-- ===================== LANES ===================== -->
  <!-- PRODUCER lane: parser + workstate -->
  <rect x="176" y="120" width="296" height="150" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-dasharray="4 3"/>
  <text x="192" y="142" font-size="10" font-weight="600" fill="#57606a" letter-spacing="0.5">PRODUCER (SPEC-KIT)</text>

  <!-- THE BRIDGE lane: reconcile engine + jira-sink -->
  <rect x="492" y="120" width="312" height="150" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-dasharray="4 3"/>
  <text x="508" y="142" font-size="10" font-weight="600" fill="#57606a" letter-spacing="0.5">THE BRIDGE</text>

  <!-- ===================== ARROWS ===================== -->
  <!-- node row: y 168..222 (height 54), connector centerline y=195 -->
  <g stroke="#8c959f" stroke-width="1.8" fill="none">
    <line x1="160" y1="195" x2="194" y2="195" marker-end="url(#arrow)"/>
    <line x1="320" y1="195" x2="348" y2="195" marker-end="url(#arrow)"/>
    <line x1="474" y1="195" x2="508" y2="195" marker-end="url(#arrow)"/>
    <line x1="636" y1="195" x2="664" y2="195" marker-end="url(#arrow)"/>
    <line x1="790" y1="195" x2="826" y2="195" marker-end="url(#arrow)"/>
  </g>

  <!-- ===================== NODES ===================== -->

  <!-- 1. source : specs/NNN-*/  (x 32, w 128) accent #64748b -->
  <g>
    <rect x="32" y="168" width="128" height="54" rx="12" fill="#ffffff" stroke="#64748b" stroke-width="1.6" filter="url(#ds)"/>
    <rect x="44" y="168" width="104" height="4" rx="2" fill="#64748b"/>
    <text x="96" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">specs/NNN-*/</text>
    <text x="96" y="212" text-anchor="middle" font-size="11" fill="#57606a">spec · plan · tasks</text>
  </g>

  <!-- 2. parser  (x 194, w 126) accent #7c3aed -->
  <g>
    <rect x="194" y="168" width="126" height="54" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.6" filter="url(#ds)"/>
    <rect x="206" y="168" width="102" height="4" rx="2" fill="#7c3aed"/>
    <text x="257" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">parser</text>
    <text x="257" y="212" text-anchor="middle" font-size="11" fill="#57606a">read &amp; infer</text>
  </g>

  <!-- 3. workstate  NEUTRAL BUS — larger + teal (x 348, w 126, taller) accent #0d9488 -->
  <g>
    <rect x="348" y="160" width="126" height="70" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="2" filter="url(#ds)"/>
    <rect x="360" y="160" width="102" height="4" rx="2" fill="#0d9488"/>
    <text x="411" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#0d9488">workstate</text>
    <text x="411" y="207" text-anchor="middle" font-size="11" fill="#57606a">neutral JSON</text>
    <text x="411" y="221" text-anchor="middle" font-size="11" fill="#57606a">contract</text>
  </g>

  <!-- 4. reconcile engine — vendor-neutral (x 508, w 128) accent #4f46e5 -->
  <g>
    <rect x="508" y="168" width="128" height="54" rx="12" fill="#ffffff" stroke="#4f46e5" stroke-width="1.6" filter="url(#ds)"/>
    <rect x="520" y="168" width="104" height="4" rx="2" fill="#4f46e5"/>
    <text x="572" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">reconcile engine</text>
    <text x="572" y="210" text-anchor="middle" font-size="11" fill="#57606a">vendor-neutral</text>
  </g>

  <!-- engine differentiator badge -->
  <rect x="508" y="234" width="128" height="20" rx="10" fill="#eef0fd" stroke="#4f46e5" stroke-opacity="0.35"/>
  <text x="572" y="248" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4f46e5">idempotent · drift-aware · fail-closed</text>

  <!-- 5. jira-sink — Jira-specific (x 664, w 126) accent #0052cc -->
  <g>
    <rect x="664" y="168" width="126" height="54" rx="12" fill="#ffffff" stroke="#0052cc" stroke-width="1.6" filter="url(#ds)"/>
    <rect x="676" y="168" width="102" height="4" rx="2" fill="#0052cc"/>
    <text x="727" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">jira-sink</text>
    <text x="727" y="210" text-anchor="middle" font-size="11" fill="#57606a">Jira-specific</text>
  </g>

  <!-- 6. Jira REST · your board  (x 826, w 122) accent #0052cc -->
  <g>
    <rect x="826" y="168" width="122" height="54" rx="12" fill="#ffffff" stroke="#0052cc" stroke-width="1.6" filter="url(#ds)"/>
    <rect x="838" y="168" width="98" height="4" rx="2" fill="#0052cc"/>
    <text x="887" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">Jira REST</text>
    <text x="887" y="210" text-anchor="middle" font-size="11" fill="#57606a">your board</text>
  </g>

  <!-- ===================== BOTTOM CAPTION ===================== -->
  <line x1="40" y1="312" x2="940" y2="312" stroke="#d0d7de" stroke-width="1"/>
  <text x="490" y="333" text-anchor="middle" font-size="11" fill="#57606a">Filesystem is the source of truth — Jira is a read-only mirror.</text>
</svg>
