    specifying: "20001"
    planning: "20002"
    tasking: "20003"
    implementing: "20004"
    ready_to_merge: "20005"
    merged: "20006"
  # optional explicit transition ids; here only `implementing` is pinned so
  # the test can exercise both the explicit-id and resolve-dynamically paths.
  transitions:
    implementing: "30004"
  labels:
    spec_prefix: "speckit-spec:"
    repo_prefix: "speckit-repo:"
    phase_prefix: "task-phase:"
    lifecycle_prefix: "phase:"
